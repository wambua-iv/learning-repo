name: Access Azure Key Vault
on: [push]

permissions:
  id-token: write 
  contents: read  

jobs:
  get-secrets:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Get Secret from Key Vault
        uses: azure/get-keyvault-secrets@v1
        with:
          keyvault: "wm-keys"
          secrets: 'AWS-ACCESS-KEY-ID'
        id: kvAction

      - name: Use Secret
        run: |
          echo "The secret value is ${{ steps.kvAction.outputs.mySecretName }}"