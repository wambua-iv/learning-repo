name: Scan, Build and Push
on: [pull_request, push, workflow_dispatch]

jobs:
  security_scan:
    name: Security Scans (Gitleaks, SAST Scan, NPM audit)
    runs-on: ubuntu-latest
    steps:
      - name: Code Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Secrets Scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.HUB_TOKEN }}

      - name: Code Checkout
        uses: actions/checkout@v6
        
      - name: SAST Scan (Semgrep)
        run: |
          docker run --rm -v "${{ github.workspace }}:/src" semgrep/semgrep \
          semgrep scan --config auto --error
      
      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Dependency Audit
        run: npm audit --audit-level=high

  build_push:
    name: Docker Build and Image Scan
    needs: security_scan
    runs-on: ubuntu-latest

    steps:
      - name: Code Checkout
        uses: actions/checkout@v3

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build Docker Image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: ${{ secrets.ECR_REPOSITORY }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
          docker tag $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG $ECR_REGISTRY/$ECR_REPOSITORY:latest

      - name: Trivy Image Scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ steps.login-ecr.outputs.registry }}/${{ secrets.ECR_REPOSITORY }}:${{ github.sha }}
          format: 'table'
          exit-code: '1' 
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'

      - name: Push Image to ECR
        if: success()
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: ${{ secrets.ECR_REPOSITORY }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest

  archive_logs:
      name: Archive Pipeline Logs to S3
      needs: [security_scan, build_push]
      if: always() 
      runs-on: ubuntu-latest
      steps:
        - name: Code Checkout
          uses: actions/checkout@v4
  
        - name: Configure AWS Credentials
          uses: aws-actions/configure-aws-credentials@v4
          with:
            aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
            aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
            aws-region: ${{ secrets.AWS_REGION }}
  
        - name: Collect and Upload Logs
          run: |
            mkdir -p audit-logs/${{ github.run_id }}
            
            echo "Workflow: ${{ github.workflow }}" > audit-logs/${{ github.run_id }}/summary.txt
            echo "Run ID: ${{ github.run_id }}" >> audit-logs/${{ github.run_id }}/summary.txt
            echo "Status: ${{ github.job_status }}" >> audit-logs/${{ github.run_id }}/summary.txt
            echo "Timestamp: $(date)" >> audit-logs/${{ github.run_id }}/summary.txt
  
            aws s3 sync audit-logs/ s3://${{ secrets.S3_LOG_BUCKET }}/pipeline-archives/
